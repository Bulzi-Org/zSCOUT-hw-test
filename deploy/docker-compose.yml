services:
  # ── Tier 2 Services (dependencies) ──────────────────────────────────────────
  # These services must be running before zscout-hw-test can probe peripherals.

  gps-svc:
    image: ghcr.io/bulzi-org/zscout-gps-svc:latest
    container_name: zscout-gps-svc
    restart: unless-stopped
    network_mode: host # Exposes REST :5200 and gpsd :2947
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0 # GPS GNSS receiver
    environment:
      - GPS_BAUD=115200 # u-blox module persists 115200 baud after gpsd auto-config
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5200/api/status" ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  compass-svc:
    image: ghcr.io/bulzi-org/zscout-compass-svc:latest
    container_name: zscout-compass-svc
    restart: unless-stopped
    network_mode: host # Exposes REST :5100
    devices:
      - /dev/i2c-1:/dev/i2c-1 # QMC5883L magnetometer on I2C bus 1
    healthcheck:
      test: [ "CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/5100 && exec 3>&-" ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  mesh:
    image: ghcr.io/bulzi-org/zscout-mesh:latest
    container_name: zscout-mesh
    restart: unless-stopped
    privileged: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - /lib/firmware:/lib/firmware:ro
      - /sys:/sys:rw
      - /dev:/dev
    env_file:
      - .env
    healthcheck:
      # bat0 + ready file: mesh radio is up before MeshSvc REST (:5102) is available.
      test: [ "CMD", "sh", "-c", "test -f /tmp/zscout-mesh-ready && ip link show bat0 | grep -q 'LOWER_UP'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  sdr-svc:
    image: ghcr.io/bulzi-org/zscout-sdr-svc:latest
    container_name: zscout-sdr-svc
    restart: unless-stopped
    network_mode: host # Exposes REST :5101
    devices:
      - /dev/usdr0:/dev/usdr0 # Wavelet-Lab uSDR via PCIe
    environment:
      - SDR_DEVICE_PATH=/dev/usdr0
    volumes:
      - /usr/lib/aarch64-linux-gnu/SoapySDR/modules0.8/libUSDRSupport.so:/usr/lib/aarch64-linux-gnu/SoapySDR/modules0.8/libUSDRSupport.so:ro
      - /usr/lib/aarch64-linux-gnu/libusdr.so.0.9.9:/usr/lib/aarch64-linux-gnu/libusdr.so.0.9.9:ro
      - /usr/lib/aarch64-linux-gnu/libusdr.so.0:/usr/lib/aarch64-linux-gnu/libusdr.so.0:ro
      - /usr/lib/aarch64-linux-gnu/libusdr.so:/usr/lib/aarch64-linux-gnu/libusdr.so:ro
      - /usr/lib/aarch64-linux-gnu/libusdr-dsp.so.0.9.9:/usr/lib/aarch64-linux-gnu/libusdr-dsp.so.0.9.9:ro
      - /usr/lib/aarch64-linux-gnu/libusdr-dsp.so.0:/usr/lib/aarch64-linux-gnu/libusdr-dsp.so.0:ro
      - /usr/lib/aarch64-linux-gnu/libusdr-dsp.so:/usr/lib/aarch64-linux-gnu/libusdr-dsp.so:ro
      - /usr/lib/aarch64-linux-gnu/libSoapySDR.so:/usr/lib/aarch64-linux-gnu/libSoapySDR.so:ro
    healthcheck:
      test: [ "CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/5101 && exec 3>&-" ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ── Main Application ────────────────────────────────────────────────────────

  # Main zSCOUT hardware test dashboard
  zscout-hw-test:
    image: ghcr.io/bulzi-org/zscout-hw-test:latest
    container_name: zscout-hw-test
    restart: unless-stopped
    depends_on:
      gps-svc:
        condition: service_healthy
      compass-svc:
        condition: service_healthy
      sdr-svc:
        condition: service_healthy
      mesh:
        condition: service_healthy

    # Networking for Tier 2 service access (gps-svc, compass-svc, sdr-svc)
    network_mode: host # Required for REST/TCP connections to Tier 2 services
    # Note: --privileged removed — adapters now use Tier 2 service REST APIs (FR-014)

    # HaLow Layer 4 scan (#97): bringing the morse iface up and running
    # `iw dev <iface> scan` is a privileged nl80211 op requiring NET_ADMIN.
    # NET_ADMIN only — still NOT --privileged.
    cap_add:
      - NET_ADMIN

    # Port mapping (only active in bridge mode, ignored with network_mode: host)
    # ports:
    #   - "5000:5000"

    # Volume mounts for persistent data and HaLow Tier A sysfs access
    volumes:
      - /sys:/sys:ro # HaLow Tier A: USB enumeration and iw (FR-009)
      - ./data:/app/data # Persistent storage for run history
      - ./logs:/app/logs # Application logs

    # Environment configuration
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - DOTNET_EnableDiagnostics=0
      - DOTNET_EnableWriteXorExecute=0

    # Resource constraints (for CM5 with limited RAM)
    deploy:
      resources:
        limits:
          cpus: '2' # CM5 Lite has 4 cores
          memory: 1024M # Conservative limit for 4GB system
        reservations:
          cpus: '1'
          memory: 512M

    # Healthcheck
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
