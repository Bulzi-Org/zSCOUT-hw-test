services:
  # Main zSCOUT hardware test dashboard
  zscout-hw-test:
    image: ghcr.io/bulzi-org/zscout-hw-test:latest
    container_name: zscout-hw-test
    restart: unless-stopped

    # Networking for Tier 2 service access (gps-svc, compass-svc, sdr-svc, mesh)
    network_mode: host # Required for gRPC/TCP connections to Tier 2 services
    # Note: --privileged removed — adapters now use Tier 2 service APIs (FR-014)

    # Port mapping (only active in bridge mode, ignored with network_mode: host)
    # ports:
    #   - "5000:5000"

    # Volume mounts for persistent data and HaLow Tier A sysfs access
    volumes:
      - /sys:/sys:ro # HaLow Tier A: USB enumeration and iw (FR-009)
      - ./data:/app/data # Persistent storage for run history
      - ./logs:/app/logs # Application logs

    # Environment configuration
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - DOTNET_EnableDiagnostics=0
      - DOTNET_EnableWriteXorExecute=0

    # Resource constraints (for CM5 with limited RAM)
    deploy:
      resources:
        limits:
          cpus: '2' # CM5 Lite has 4 cores
          memory: 1024M # Conservative limit for 4GB system
        reservations:
          cpus: '1'
          memory: 512M

    # Healthcheck
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
    driver: local
  logs:
    driver: local
