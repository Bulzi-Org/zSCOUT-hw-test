syntax = "proto3";

option csharp_namespace = "ZScout.HwTest.App.Protos";

package sdr;

// SdrService exposes the Wavelet-Lab uSDR via sdr-svc.
service SdrService {
  // Returns device availability and basic info.
  rpc GetStatus (SdrStatusRequest) returns (SdrStatusReply);

  // Returns detailed device capabilities (tuning range, sample rates, etc.).
  rpc GetCapabilities (SdrCapabilitiesRequest) returns (SdrCapabilitiesReply);

  // Performs a power spectrum scan over a specified band.
  rpc ScanPowerSpectrum (SdrScanRequest) returns (SdrScanReply);
}

message SdrStatusRequest {}

message SdrStatusReply {
  bool available = 1;
  string driver = 2;
  string device_label = 3;
  string serial = 4;
  string status_message = 5;
}

message SdrCapabilitiesRequest {}

message SdrCapabilitiesReply {
  double min_frequency_hz = 1;
  double max_frequency_hz = 2;
  repeated double sample_rates = 3;
  repeated string antennas = 4;
  double min_gain_db = 5;
  double max_gain_db = 6;
}

message SdrScanRequest {
  double start_frequency_hz = 1;
  double end_frequency_hz = 2;
  double step_hz = 3;
  double dwell_time_ms = 4;
}

message SdrScanReply {
  repeated SdrPowerSample samples = 1;
  string status_message = 2;
}

message SdrPowerSample {
  double frequency_hz = 1;
  double power_dbm = 2;
}
