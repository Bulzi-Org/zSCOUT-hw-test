syntax = "proto3";

option csharp_namespace = "ZScout.HwTest.App.Protos";

package mesh;

// MeshService exposes the batman-adv mesh network status via zSCOUT-mesh.
service MeshService {
  // Returns mesh association and gateway status.
  rpc GetStatus (MeshStatusRequest) returns (MeshStatusReply);

  // Returns the list of batman-adv peers (originators/neighbors).
  rpc GetPeers (MeshPeersRequest) returns (MeshPeersReply);

  // Streams continuous mesh health updates.
  rpc StreamStatus (MeshStreamRequest) returns (stream MeshStatusReply);
}

message MeshStatusRequest {}

message MeshStatusReply {
  bool associated = 1;
  string gateway_mode = 2;
  string bat0_ip = 3;
  bool internet_reachable = 4;
  int32 peer_count = 5;
  string status_message = 6;
}

message MeshPeersRequest {}

message MeshPeersReply {
  repeated MeshPeer peers = 1;
}

message MeshPeer {
  string mac_address = 1;
  double tq = 2;          // Transmission quality (0.0 - 1.0)
  string last_seen = 3;
  bool is_neighbor = 4;
}

message MeshStreamRequest {
  int32 interval_ms = 1;
}
