openapi: 3.1.0
info:
  title: zSCOUT Hardware Test Dashboard API
  version: 0.1.0
  description: >-
    API contract for run orchestration, telemetry access, manual verdict capture,
    and export operations exposed by the Blazor Server dashboard backend.
servers:
  - url: http://{cm5Ip}:5000
    variables:
      cm5Ip:
        default: 192.168.1.100
security:
  - sessionAuth: []
paths:
  /api/v1/auth/login:
    post:
      summary: Start a local authenticated session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login success
        '401':
          description: Invalid credentials
  /api/v1/auth/me:
    get:
      summary: Return current session identity and role
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSession'
        '401':
          description: Not authenticated
  /api/v1/peripherals:
    get:
      summary: List supported peripherals and live status
      responses:
        '200':
          description: Peripheral status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PeripheralProfile'
  /api/v1/runs:
    get:
      summary: List historical runs
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [host, container]
        - name: fromUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Run history response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TestRun'
    post:
      summary: Start a new run
      description: Requires operator or admin role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
      responses:
        '202':
          description: Run accepted and queued/running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRun'
        '409':
          description: Run rejected because another run is active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/runs/{runId}:
    get:
      summary: Get run details including per-peripheral evidence and verdicts
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRunDetails'
        '404':
          description: Run not found
  /api/v1/runs/{runId}/stop:
    post:
      summary: Stop an active run
      description: Requires operator or admin role
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '202':
          description: Stop accepted
        '409':
          description: Run is not stoppable in current state
  /api/v1/runs/{runId}/peripherals/{peripheralId}/verdict:
    post:
      summary: Submit operator verdict for one peripheral
      description: Requires operator or admin role
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/PeripheralId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitVerdictRequest'
      responses:
        '200':
          description: Verdict stored
        '400':
          description: Invalid verdict payload
        '409':
          description: Run state does not allow verdict submission
  /api/v1/streams/{streamType}:
    get:
      summary: Poll latest raw telemetry records for a stream type
      parameters:
        - name: streamType
          in: path
          required: true
          schema:
            type: string
            enum: [gps_nmea, sdr_info, halow_metrics, compass_heading]
        - name: runId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Stream records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemetryRecord'
  /api/v1/exports:
    post:
      summary: Create export job for retained runs and telemetry
      description: Requires operator or admin role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromUtc, toUtc, format]
              properties:
                fromUtc:
                  type: string
                  format: date-time
                toUtc:
                  type: string
                  format: date-time
                format:
                  type: string
                  enum: [zip-json]
      responses:
        '202':
          description: Export job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: zscout_session
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    PeripheralId:
      name: peripheralId
      in: path
      required: true
      schema:
        type: string
        enum: [gps, sdr, halow, compass]
  schemas:
    UserSession:
      type: object
      required: [userId, username, role]
      properties:
        userId:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [viewer, operator, admin]
    PeripheralProfile:
      type: object
      required: [peripheralId, displayName, lastObservedStatus]
      properties:
        peripheralId:
          type: string
          enum: [gps, sdr, halow, compass]
        displayName:
          type: string
        expectedPath:
          type: string
          nullable: true
        dependencyService:
          type: string
          nullable: true
        driverName:
          type: string
          nullable: true
        lastObservedStatus:
          type: string
          enum: [unknown, ready, degraded, unavailable]
        lastObservedAtUtc:
          type: string
          format: date-time
          nullable: true
        lastDiagnostic:
          type: string
          nullable: true
    StartRunRequest:
      type: object
      required: [mode, configuration]
      properties:
        mode:
          type: string
          enum: [host, container]
        configuration:
          type: object
          additionalProperties: true
    SubmitVerdictRequest:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [pass, fail]
        failureReason:
          type: string
          nullable: true
      allOf:
        - if:
            properties:
              outcome:
                const: fail
          then:
            required: [failureReason]
    TestRun:
      type: object
      required: [runId, mode, status, requestedByUserId]
      properties:
        runId:
          type: string
        mode:
          type: string
          enum: [host, container]
        status:
          type: string
          enum: [queued, running, awaiting_verdict, completed, failed, stopped, rejected]
        requestedByUserId:
          type: string
        startedAtUtc:
          type: string
          format: date-time
          nullable: true
        finishedAtUtc:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        overallOutcome:
          type: string
          enum: [pass, fail, inconclusive]
          nullable: true
    TestRunDetails:
      allOf:
        - $ref: '#/components/schemas/TestRun'
        - type: object
          properties:
            evidence:
              type: array
              items:
                type: object
                properties:
                  peripheralId:
                    type: string
                  sampleCount:
                    type: integer
                  dependencyAvailable:
                    type: boolean
                  diagnosticMessages:
                    type: array
                    items:
                      type: string
            verdicts:
              type: array
              items:
                type: object
                properties:
                  peripheralId:
                    type: string
                  outcome:
                    type: string
                    enum: [pass, fail]
                  failureReason:
                    type: string
                    nullable: true
                  assignedByUserId:
                    type: string
                  assignedAtUtc:
                    type: string
                    format: date-time
    TelemetryRecord:
      type: object
      required: [runId, peripheralId, streamType, timestampUtc, payload, isMalformed]
      properties:
        runId:
          type: string
        peripheralId:
          type: string
          enum: [gps, sdr, halow, compass]
        streamType:
          type: string
          enum: [gps_nmea, sdr_info, halow_metrics, compass_heading]
        timestampUtc:
          type: string
          format: date-time
        payload:
          description: Raw stream payload as string or JSON object
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        isMalformed:
          type: boolean
    ExportJob:
      type: object
      required: [exportJobId, status, createdAtUtc]
      properties:
        exportJobId:
          type: string
        status:
          type: string
          enum: [queued, ready, failed]
        createdAtUtc:
          type: string
          format: date-time
        expiresAtUtc:
          type: string
          format: date-time
          nullable: true
        artifactPath:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string